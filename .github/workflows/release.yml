name: Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

jobs:
  build:
    name: Build and Release
    runs-on: macos-15
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Show Xcode Version
        run: xcodebuild -version

      - name: Clean DerivedData
        run: rm -rf ~/Library/Developer/Xcode/DerivedData

      - name: Calculate Version
        id: versioning
        run: |
          COMMIT_COUNT=$(git rev-list --count HEAD)
          APP_VERSION="2.0.$COMMIT_COUNT"
          echo "APP_VERSION=$APP_VERSION" >> $GITHUB_ENV
          echo "VERSION=$APP_VERSION" >> $GITHUB_OUTPUT

      - name: Build App
        run: |
          swift build -c release
          mkdir -p WhisperKiller.app/Contents/MacOS
          mkdir -p WhisperKiller.app/Contents/Resources
          
          # Find the binary dynamically
          echo "🔍 Looking for binary: WhisperKiller in .build/..."
          ACTUAL_BINARY=$(find .build -name "WhisperKiller" -type f -not -path "*.dSYM*" 2>/dev/null | grep -i "/release/" | head -n 1)
          
          if [ -z "$ACTUAL_BINARY" ]; then
            echo "❌ Binary not found!"
            find .build -name "WhisperKiller" -type f 2>/dev/null
            exit 1
          fi
          echo "Found binary at: $ACTUAL_BINARY"
          
          cp "$ACTUAL_BINARY" WhisperKiller.app/Contents/MacOS/
          chmod +x WhisperKiller.app/Contents/MacOS/WhisperKiller
          
          cp Sources/WhisperFree/Resources/Info.plist WhisperKiller.app/Contents/
          
          # Inject metadata into Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion ${{ env.APP_VERSION }}" "WhisperKiller.app/Contents/Info.plist"
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString ${{ env.APP_VERSION }}" "WhisperKiller.app/Contents/Info.plist"
          /usr/libexec/PlistBuddy -c "Set :CFBundleExecutable WhisperKiller" "WhisperKiller.app/Contents/Info.plist"
          
          if [ -f Sources/WhisperFree/Resources/AppIcon.icns ]; then
            cp Sources/WhisperFree/Resources/AppIcon.icns WhisperKiller.app/Contents/Resources/
          fi
          
          # Ad-hoc sign after all files are in place
          codesign --force --deep --sign - WhisperKiller.app

      - name: Create DMG
        run: |
          hdiutil create -volname "WhisperKiller" -srcfolder "WhisperKiller.app" -ov -format UDZO "WhisperKiller.dmg"

      - name: Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ env.APP_VERSION }}
          name: WhisperKiller v${{ env.APP_VERSION }}
          files: |
            WhisperKiller.dmg
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
